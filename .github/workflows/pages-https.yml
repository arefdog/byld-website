name: Enforce HTTPS on Pages

on:
  workflow_dispatch:
    inputs:
      recycle_domain:
        description: >-
          Remove and re-add the custom domain to retrigger certificate
          provisioning. Causes a brief outage on the site while unset.
        type: boolean
        default: false

permissions:
  contents: read
  pages: write

jobs:
  https:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        if: ${{ inputs.recycle_domain }}
        uses: actions/checkout@v4

      - name: Recycle custom domain (only when requested)
        if: ${{ inputs.recycle_domain }}
        run: |
          domain=$(cat static/CNAME)
          echo '{"cname":null}' | gh api -X PUT "repos/$REPO/pages" --input -
          for _ in $(seq 1 12); do
            [ "$(gh api "repos/$REPO/pages" --jq '.cname // "null"')" = "null" ] && break
            sleep 5
          done
          jq -n --arg d "$domain" '{cname: $d}' | gh api -X PUT "repos/$REPO/pages" --input -
          echo "Domain $domain removed and re-added; certificate provisioning restarted."

      - name: Enforce HTTPS once the certificate is ready
        run: |
          pages=$(gh api "repos/$REPO/pages")
          jq . <<<"$pages"
          if [ "$(jq -r '.https_enforced' <<<"$pages")" = "true" ]; then
            echo "Enforce HTTPS is already on."
            exit 0
          fi
          state=$(jq -r '.https_certificate.state // "none"' <<<"$pages")
          case "$state" in
            approved|issued|uploaded)
              echo '{"https_enforced":true}' | gh api -X PUT "repos/$REPO/pages" --input -
              echo "Enforce HTTPS turned ON."
              ;;
            *)
              echo "Certificate not ready (state: $state); cannot enforce HTTPS yet."
              ;;
          esac
