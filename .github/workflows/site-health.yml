name: Site health check

# Fails — and emails the owner — only when https://gobyld.com/ is
# actually unreachable or serving something that isn't the BYLD site
# (DNS breakage, expired HTTPS cert, lost CNAME, parked domain).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check gobyld.com is up and serving BYLD
        run: |
          # Retry for ~3 minutes before declaring the site down so a
          # transient network blip doesn't send a false-alarm email.
          body=$(curl -sS --fail --location \
            --retry 8 --retry-delay 20 --retry-all-errors \
            --max-time 30 https://gobyld.com/)
          if ! grep -qi "BYLD" <<<"$body"; then
            echo "::error::gobyld.com responded but the content doesn't look like the BYLD site"
            exit 1
          fi
