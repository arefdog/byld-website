name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress production deploys finish
# (cancelling them mid-flight leaves Pages stuck in deployment_queued).
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    # Pages backend failures are transient and self-heal on the next push,
    # so never fail the run for them — the owner doesn't want failure
    # emails. Check the Actions tab if the live site ever looks stale.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # The Pages backend intermittently drops deployments ("Deployment
      # failed, try again later" / "Deployment cancelled") even when the
      # build is fine, so tolerate one failure and retry once before
      # failing the run.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          # Wait the maximum the action allows (10 min) for Pages pickup.
          timeout: 600000
      - name: Wait before retrying failed deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - name: Deploy to GitHub Pages (retry)
        id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
