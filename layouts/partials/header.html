<header class="site-header" id="top">
  <div class="header-inner">
    <button class="menu-btn" aria-label="Open menu" aria-expanded="false" aria-controls="site-menu">
      <span class="menu-dots" aria-hidden="true"></span>
    </button>

    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="BYLD home">
      <img src="{{ "img/byld-logo-black.svg" | relURL }}" alt="BYLD" class="brand-logo brand-logo-dark">
      <img src="{{ "img/byld-logo-white.svg" | relURL }}" alt="BYLD" class="brand-logo brand-logo-light" aria-hidden="true">
    </a>

    <a class="btn btn-primary btn-sm header-cta" href="{{ "#configurator" | relURL }}">Get an estimate</a>

    <nav class="dropdown-menu" id="site-menu" aria-label="Primary" hidden>
      {{ range site.Menus.main }}
        <a href="{{ .URL | strings.TrimPrefix "/" | relURL }}">{{ .Name }}</a>
      {{ end }}
      <a href="{{ "#configurator" | relURL }}" class="dropdown-cta">Get an estimate</a>
    </nav>
  </div>
</header>
