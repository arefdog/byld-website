<header class="site-header" id="top">
  <div class="header-inner">
    <a class="brand" href="{{ "/" | relURL }}" aria-label="BYLD home">
      <img src="{{ "img/byld-logo-black.svg" | relURL }}" alt="BYLD" class="brand-logo">
    </a>

    <nav class="nav" aria-label="Primary">
      {{ range site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>

    <a class="btn btn-primary btn-sm header-cta" href="{{ "/#contact" | relURL }}">Book a consultation</a>

    <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span>
    </button>
  </div>

  <div class="mobile-nav" hidden>
    {{ range site.Menus.main }}
      <a href="{{ .URL | relURL }}">{{ .Name }}</a>
    {{ end }}
    <a href="{{ "/#contact" | relURL }}" class="mobile-cta">Book a consultation</a>
  </div>
</header>
