<header class="site-header" id="top">
  <div class="header-inner">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="BYLD home">
      <img src="{{ "img/byld-logo-black.svg" | relURL }}" alt="BYLD" class="brand-logo">
    </a>

    <nav class="nav" aria-label="Primary">
      {{ range site.Menus.main }}
        <a href="{{ .URL | strings.TrimPrefix "/" | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>

    <a class="btn btn-primary btn-sm header-cta" href="{{ "#configurator" | relURL }}">Get an estimate</a>

    <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span>
    </button>
  </div>

  <div class="mobile-nav" hidden>
    {{ range site.Menus.main }}
      <a href="{{ .URL | strings.TrimPrefix "/" | relURL }}">{{ .Name }}</a>
    {{ end }}
    <a href="{{ "#configurator" | relURL }}" class="mobile-cta">Get an estimate</a>
  </div>
</header>
