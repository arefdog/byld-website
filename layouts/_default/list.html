{{ define "main" }}
<section class="section">
  <div class="section-head">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </div>
  <div class="grid grid-3">
    {{ range .Pages }}
    <article class="card">
      <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      <p>{{ .Summary }}</p>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
