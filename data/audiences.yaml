- key: developers
  label: Developers & Investors
  headline: De-risk the pro forma
  body: Cost certainty earlier, a faster route to revenue, and density that scales with demand. Factory and site run in parallel, so capital is deployed for less time before a project performs.
  points:
    - Indicative costs from the feasibility stage
    - Parallel manufacture and site works compress the programme
    - Scalable density — stretch or cluster units as the market moves
    - Optional tokenized ownership and financing structures
- key: operators
  label: Operators & Brands
  headline: Open sooner, scale by market
  body: For hospitality and commercial operators who need a distinctive space, fast. Standardized units connect to shared utilities, so layouts and density adapt to each location and operating model.
  points:
    - Shorter time-to-open per site
    - Brand-flexible architecture and demountable activations
    - Comfort-engineered for the local climate
    - Repeatable rollout across multiple locations
- key: landowners
  label: Landowners
  headline: Unlock what your site can be
  body: Build on uneven or constrained ground that conventional foundations struggle with. From a single cabin to a full community, we start with a feasibility read on what your land can support.
  points:
    - Shallow foundations suit difficult or sloping terrain
    - Minimal excavation and site disturbance
    - Planning and regulatory read before you commit
    - Phased development — start small, grow over time
- key: architects
  label: Architects & Partners
  headline: A kit-of-parts to design with
  body: A configurable system that keeps design freedom while removing the inefficiency. Engineered components, digital models, and regional supply chains you can build into your own projects.
  points:
    - Varied form without losing factory efficiency
    - Engineered, digitally modeled components
    - Regional manufacturing and local finishes
    - Collaboration from concept through installation
