- title: Masterplanung & Standortstrategie
  body: Standortanalyse, Anordnung und Infrastrukturkoordination, um das Projekt an Topografie, Erschließung und Bauphasen auszurichten.
- title: Produktentwicklung & Design
  body: Tragwerksplanung, Materialforschung und digitale Modellierung machen aus einem System ein baubares Gebäude.
- title: Fertigung
  body: Regionale Fertigungsnetzwerke in Europa, Afrika, dem Nahen Osten und Amerika, um Komponenten nah an der Baustelle zu produzieren.
- title: Design- & Montagepakete
  body: Flexible Leistungsumfänge, vom reinen Design bis zur schlüsselfertigen Übergabe und Montage vor Ort.
- title: Komfort-Engineering
  body: Klimaspezifische Analysen und fein abgestimmte Systeme für leistungsstarke Räume an jedem Standort.
- title: Normen & Genehmigungen
  body: Lokale Normen, Vorschriften und Genehmigungen werden von der ersten Entwurfsphase an in das System integriert.
