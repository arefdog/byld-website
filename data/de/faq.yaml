- q: Wie viel schneller ist ein BYLD-Bau?
  a: Das hängt von Standort und System ab. Da die Komponenten außerhalb der Baustelle gefertigt werden, während die Erdarbeiten parallel laufen, sind Projekte in der Regel deutlich früher bezugsfertig als ein vergleichbarer konventioneller Bau. Ein indikatives Bauprogramm erhalten Sie in der Machbarkeitsphase.
- q: Wie ist die Preisgestaltung aufgebaut?
  a: Wir starten mit Richtkosten in der Machbarkeitsphase und konkretisieren sie, sobald das System konfiguriert und berechnet ist. Der Leistungsumfang reicht vom reinen Design bis zur schlüsselfertigen Übergabe, Sie steigen auf der Ebene ein, die zum Projekt passt.
- q: Können Sie auf schwierigem oder abschüssigem Gelände bauen?
  a: Ja. Dank flacher Gründungen funktionieren unsere Systeme auch auf unebenem oder schwierigem Gelände, wo klassische Fundamente an ihre Grenzen stoßen, meist mit deutlich weniger Aushub.
- q: Kümmern Sie sich um Planung und Genehmigungen?
  a: Wir prüfen den planungs- und baurechtlichen Rahmen im Zuge der Machbarkeit und integrieren lokale Normen und Standards von Anfang an in den Entwurf. Bei Einreichungen koordinieren wir uns mit Beratern vor Ort.
- q: Mit welchen Materialien bauen Sie?
  a: Vor allem mit technischem Holz (Brettschichtholz und CLT), das Kohlenstoff speichert und den Einsatz von Beton und Stahl reduziert, kombiniert mit lokalen Oberflächen, wo möglich.
- q: Wo sind Sie tätig?
  a: Unser Sitz ist in Madrid, gefertigt wird über regionale Netzwerke in Europa, Afrika, dem Nahen Osten und Amerika, sodass Komponenten nah an der Baustelle entstehen.
- q: Kann ein Gebäude später erweitert oder versetzt werden?
  a: "Ja. Die Systeme sind demontierbar und rekonfigurierbar: Sie können Einheiten ergänzen, Grundrisse ändern oder das Gebäude versetzen, statt abzureißen und neu zu bauen."
- q: Was ist das "tokenisierte Gebäude", für das Sie bekannt sind?
  a: The Hub ICON, der demontierbare Pavillon, den BYLD gemeinsam mit Hub Culture in Davos entwickelt und realisiert hat, besitzt über Hedera einen digitalen Zwilling on-chain; Fertigung, Montage und Nutzung sind in die digitale Welt integriert. Ein reales, preisgekröntes Gebäude mit einem digitalen Zwilling in Echtzeit und On-Chain-Register, und die Grundlage der Finanzierungs- und Co-Investment-Strukturen, die wir als Nächstes entwickeln.
