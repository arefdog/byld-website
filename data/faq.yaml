- q: How much faster is a BYLD build?
  a: It depends on the site and system, but because components are manufactured off site while groundwork happens in parallel, projects typically reach occupancy meaningfully faster than a comparable traditional build. We give you an indicative programme at the feasibility stage.
- q: How is pricing structured?
  a: We work from an indicative cost at feasibility, then firm it up as the system is configured and engineered. Scopes range from design-only through to full turnkey delivery, so you can engage at the level that suits the project.
- q: Can you build on a difficult or sloping site?
  a: Yes. Shallow foundations let our systems work on uneven or difficult ground that conventional foundations struggle with, usually with far less excavation.
- q: Do you handle planning and permits?
  a: We read the planning and regulatory context as part of feasibility and integrate local codes and standards into the design from the outset. We can coordinate with local consultants on submissions.
- q: What materials do you build with?
  a: Primarily engineered timber — glulam and CLT — which stores carbon and reduces reliance on concrete and steel, combined with local finishes where possible.
- q: Where do you operate?
  a: We are based in Madrid and manufacture through regional networks across Europe, Africa, the Middle East, and the Americas, so components can be made close to site.
- q: Can a building be expanded or relocated later?
  a: Yes. The systems are demountable and reconfigurable — you can add units, change layouts, or relocate, rather than demolish and rebuild.
