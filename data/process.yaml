- step: "01"
  title: Feasibility & site strategy
  body: We analyse the site, test massing and density, read the planning context, and return indicative costs, so you can make a decision with real numbers.
- step: "02"
  title: System design & engineering
  body: Structural engineering, material selection, comfort analysis, and digital modeling turn the brief into a buildable, configured system.
- step: "03"
  title: Manufacture
  body: Precision components are fabricated through our regional networks, quality-controlled off site while groundwork begins in parallel.
- step: "04"
  title: Installation
  body: Shallow foundations and rapid on-site assembly bring the build together quickly, with local craftsmanship and finishes where possible.
- step: "05"
  title: Operate & scale
  body: Add units, reconfigure layouts, or repeat the system across new sites as demand grows. The kit-of-parts is built to evolve.
