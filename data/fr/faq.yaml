- q: À quel point une construction BYLD est-elle plus rapide ?
  a: Cela dépend du site et du système, mais comme les composants sont fabriqués hors site pendant que les travaux de terrain avancent en parallèle, les projets sont généralement livrés nettement plus tôt qu'une construction traditionnelle comparable. Nous vous donnons un calendrier indicatif dès la phase de faisabilité.
- q: Comment le prix est-il structuré ?
  a: Nous partons d'un coût indicatif en phase de faisabilité, puis nous l'affinons à mesure que le système est configuré et calculé. Les périmètres vont du design seul à la livraison clé en main, vous vous engagez au niveau qui convient au projet.
- q: Pouvez-vous construire sur un terrain difficile ou en pente ?
  a: Oui. Les fondations superficielles permettent à nos systèmes de fonctionner sur des terrains irréguliers ou difficiles, là où les fondations classiques posent problème, généralement avec beaucoup moins de terrassement.
- q: Gérez-vous l'urbanisme et les autorisations ?
  a: Nous étudions le contexte urbanistique et réglementaire dans le cadre de la faisabilité et intégrons les normes locales dans la conception dès le départ. Nous pouvons nous coordonner avec des consultants locaux pour les dossiers.
- q: Avec quels matériaux construisez-vous ?
  a: Principalement du bois d'ingénierie (lamellé-collé et CLT), qui stocke le carbone et réduit la dépendance au béton et à l'acier, combiné à des finitions locales quand c'est possible.
- q: Où opérez-vous ?
  a: Nous sommes basés à Madrid et fabriquons via des réseaux régionaux en Europe, en Afrique, au Moyen-Orient et dans les Amériques, pour produire les composants près du chantier.
- q: Un bâtiment peut-il être agrandi ou déplacé plus tard ?
  a: "Oui. Les systèmes sont démontables et reconfigurables : vous pouvez ajouter des unités, modifier les plans ou déplacer le bâtiment, plutôt que démolir et reconstruire."
- q: Qu'est-ce que le « bâtiment tokenisé » pour lequel on vous a distingués ?
  a: The Hub ICON, le pavillon démontable que BYLD a développé et livré à Davos avec Hub Culture, possède un jumeau numérique on-chain via Hedera ; sa fabrication, son montage et son usage sont intégrés au monde numérique. Un bâtiment réel et primé, avec un jumeau numérique en direct et un registre on-chain, et la base des structures de financement et de co-investissement que nous développons.
