- q: ¿Cuánto más rápida es una obra de BYLD?
  a: Depende del emplazamiento y del sistema, pero como los componentes se fabrican fuera de la obra mientras el trabajo de campo avanza en paralelo, los proyectos suelen llegar a la ocupación bastante antes que una obra tradicional comparable. Te damos un programa orientativo en la fase de viabilidad.
- q: ¿Cómo se estructura el precio?
  a: Partimos de un coste orientativo en la fase de viabilidad y lo concretamos a medida que el sistema se configura y se calcula. Los alcances van desde solo diseño hasta la entrega llave en mano, para que participes al nivel que mejor encaje con el proyecto.
- q: ¿Podéis construir en un terreno difícil o en pendiente?
  a: Sí. La cimentación superficial permite que nuestros sistemas funcionen en terrenos irregulares o difíciles donde la cimentación convencional tiene problemas, normalmente con mucha menos excavación.
- q: ¿Os encargáis del planeamiento y las licencias?
  a: Estudiamos el contexto urbanístico y normativo como parte de la viabilidad e integramos los códigos y estándares locales en el diseño desde el principio. Podemos coordinarnos con consultores locales para las tramitaciones.
- q: ¿Con qué materiales construís?
  a: Principalmente madera técnica (laminada y CLT), que almacena carbono y reduce la dependencia del hormigón y el acero, combinada con acabados locales cuando es posible.
- q: ¿Dónde operáis?
  a: Tenemos la base en Madrid y fabricamos a través de redes regionales en Europa, África, Oriente Medio y América, de modo que los componentes se producen cerca de la obra.
- q: ¿Se puede ampliar o trasladar un edificio más adelante?
  a: "Sí. Los sistemas son desmontables y reconfigurables: puedes añadir unidades, cambiar la distribución o trasladar el edificio, en lugar de demoler y volver a construir."
- q: ¿Qué es el "edificio tokenizado" por el que os han destacado?
  a: The Hub ICON, el pabellón desmontable que BYLD desarrolló y entregó en Davos junto a Hub Culture, tiene un gemelo digital on-chain a través de Hedera, con su fabricación, montaje y uso integrados en el mundo digital. Un edificio real y premiado con un gemelo digital en vivo y registro on-chain, y la base de las estructuras de financiación y coinversión que estamos desarrollando.
