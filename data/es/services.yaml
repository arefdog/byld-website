- title: Master plan y estrategia de emplazamiento
  body: Análisis del terreno, implantación y coordinación de infraestructuras para alinear el proyecto con la topografía, los accesos y las fases de obra.
- title: Desarrollo de producto y diseño
  body: Ingeniería estructural, investigación de materiales y modelado digital que convierten un sistema en un edificio construible.
- title: Fabricación
  body: Redes de fabricación regionales en Europa, África, Oriente Medio y América para producir los componentes cerca de la obra.
- title: Paquetes de diseño e instalación
  body: Alcances flexibles, desde solo diseño hasta la entrega llave en mano y el montaje en obra.
- title: Ingeniería de confort
  body: Análisis climático específico y sistemas ajustados para lograr espacios de alto rendimiento en cualquier ubicación.
- title: Cumplimiento normativo
  body: Normativa local, códigos y licencias integrados en el sistema desde la primera fase de diseño.
