- sector: Hospitality
  name: ECHO
  body: A system for hospitality projects, designed to scale through stretching or clustering across sites. Standardized units connect to shared utilities, allowing layouts and density to adapt by location, market demand, and operating model.
- sector: Commercial
  name: The ICON
  body: A demountable pavilion system for commercial activations, designed to create a strong architectural presence while supporting rapid installation, repeat use, and adaptable branding across events, locations, and campaigns.
- sector: Residential
  name: ATLAS
  body: A residential kit-of-parts system for creating varied housing layouts across different site types, densities, and development scales. Standardized components support efficient construction, shared infrastructure planning, and flexible configurations from individual homes to complete residential communities.
