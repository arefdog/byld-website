intro: "Lower-impact building is built into the system, not bolted on. Engineered timber, minimal site disturbance, and a regional supply model reduce carbon across the whole project."
points:
  - title: Engineered timber structure
    body: Glulam and CLT primary structure stores carbon and replaces high-emission concrete and steel where possible.
  - title: Minimal site disturbance
    body: Shallow foundations mean less excavation, less concrete, and a lighter touch on the landscape.
  - title: Regional supply chains
    body: Manufacturing close to site cuts transport emissions and keeps value in the local economy.
  - title: Designed for a second life
    body: Demountable, reusable components mean buildings can be relocated or reconfigured instead of demolished.
