baseURL = "https://www.gobyld.com/"
defaultContentLanguage = "en"
title = "BYLD – Modular Construction Systems"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[languages.en]
  label = "English"
  locale = "en-US"

[params]
  description = "Design and manufacture of modular building systems, supported by site planning, logistics, and installation strategies."
  email = "office@gobyld.com"
  address = "Calle Conde de Aranda 1, 28014 Madrid, Spain"
  # Consultation form endpoint. Create a free form at https://formspree.io,
  # then paste its URL here (e.g. https://formspree.io/f/abcdwxyz).
  # While empty, the form falls back to a pre-filled email to the address above.
  formAction = ""

  # Analytics (off until set). Use ONE of these:
  #   plausibleDomain = "gobyld.com"   # privacy-friendly, recommended
  #   googleAnalytics = "G-XXXXXXXXXX" # GA4
  plausibleDomain = ""
  googleAnalytics = ""

  [params.social]
    instagram = "https://www.instagram.com/gobyld"
    linkedin = "https://www.linkedin.com/company/byld-development/"

[menu]
  [[menu.main]]
    name = "Systems"
    url = "/#systems"
    weight = 20
  [[menu.main]]
    name = "FAQ"
    url = "/#faq"
    weight = 60
  [[menu.main]]
    name = "Contact"
    url = "/#contact"
    weight = 70

[markup.goldmark.renderer]
  unsafe = true
